services:
  - type: web
    name: iseyaa-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: api-data
      mountPath: /data
      sizeGB: 1
