# Kubernetes - ISEYAA Web Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iseyaa-web
  labels:
    app: iseyaa-web
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iseyaa-web
  template:
    metadata:
      labels:
        app: iseyaa-web
        component: frontend
    spec:
      containers:
        - name: web
          image: iseyaa/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://iseyaa-api:8000"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: iseyaa-web
spec:
  selector:
    app: iseyaa-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer

---
# ISEYAA API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iseyaa-api
  labels:
    app: iseyaa-api
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iseyaa-api
  template:
    metadata:
      labels:
        app: iseyaa-api
        component: backend
    spec:
      containers:
        - name: api
          image: iseyaa/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iseyaa-secrets
                  key: database-url
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iseyaa-secrets
                  key: supabase-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iseyaa-secrets
                  key: openai-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: iseyaa-api
spec:
  selector:
    app: iseyaa-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

