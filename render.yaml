services:
  - type: web
    name: iseyaa-ai-engine
    runtime: python
    buildCommand: "pip install -r apps/ai-engine/requirements.txt"
    startCommand: "python apps/ai-engine/main.py"
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: "production"
      - key: START_TIME
        generateValue: true
    healthCheckPath: "/api/system/health"
